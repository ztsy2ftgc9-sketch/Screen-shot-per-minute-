<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>SMC Auto Sender</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; background: #111; color: white; }
        video { width: 95%; max-width: 500px; border-radius: 10px; border: 2px solid #00ffcc; margin-top: 20px; }
        #status { color: #00ffcc; font-size: 18px; margin-top: 15px; padding: 0 10px; }
    </style>
</head>
<body>

    <h2>🤖 ماسح الشارت التلقائي لـ الآيباد</h2>
    <video id="video" autoplay playsinline></video>
    <div id="status">جاري تشغيل الكاميرا التلقائية...</div>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const statusDiv = document.getElementById('status');
        
        const TELEGRAM_TOKEN = "8955930222:AAGNk2x0EymONbeh25RxKYByh1NSFbSbiUE"; 
        const MY_CHAT_ID = "-1004242636129"; 

        const constraints = {
            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
        };

        navigator.mediaDevices.getUserMedia(constraints)
            .then(stream => {
                video.srcObject = stream;
                video.setAttribute('playsinline', true);
                statusDiv.innerText = "📸 الكاميرا تعمل بنجاح! وجهها للشارت وسيقوم التطبيق بالإرسال كل دقيقة تلقائياً...";
                
                setInterval(captureAndSendToTelegram, 60000);
            })
            .catch(err => {
                statusDiv.innerText = "❌ خطأ في تشغيل الكاميرا. تأكد من إعطاء الصلاحية من إعدادات الآيباد.";
            });

        function captureAndSendToTelegram() {
            statusDiv.innerText = "⏳ جاري لقط الشارت الآن وإرساله إلى المحادثة...";
            
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', MY_CHAT_ID);
                formData.append('photo', blob, 'chart.jpg');
                
                fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if(data.ok) {
                        statusDiv.innerText = "✅ تم إرسال الصورة للشات بنجاح! انتظر ثواني ليقوم كود اللابتوب بتحليلها...";
                    } else {
                        statusDiv.innerText = "❌ فشل إرسال الصورة للتليجرام: " + data.description;
                    }
                })
                .catch(err => {
                    statusDiv.innerText = "❌ خطأ في الاتصال بالإنترنت: " + err;
                });
            }, 'image/jpeg', 0.7);
        }
    </script>
</body>
</html>
