<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>SMC Auto Sender</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; background: #111; color: white; }
        video { width: 95%; max-width: 500px; border-radius: 10px; border: 2px solid #00ffcc; margin-top: 20px; }
        #status { color: #00ffcc; font-size: 18px; margin-top: 15px; padding: 0 10px; }
    </style>
</head>
<body>

    <h2>🤖 ماسح الشارت التلقائي لـ الآيباد (Direct Link)</h2>
    <video id="video" autoplay playsinline></video>
    <div id="status">جاري تشغيل الكاميرا التلقائية...</div>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const statusDiv = document.getElementById('status');
        
        // 1. ضع عنوان الـ IP الخاص باللابتوب هنا (تأكد أن الآيباد واللابتوب على نفس الواي فاي)
        const LAPTOP_IP = "127.0.0.1:5000"; // <--- غير هذا إلى الـ IP الخاص بلابتوبك
        const SERVER_URL = `http://${LAPTOP_IP}:5000/upload_chart`;

        const constraints = {
            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
        };

        navigator.mediaDevices.getUserMedia(constraints)
            .then(stream => {
                video.srcObject = stream;
                video.setAttribute('playsinline', true);
                statusDiv.innerText = "📸 الكاميرا تعمل! يتم الإرسال مباشرة للابتوب كل دقيقة...";
                
                setInterval(captureAndSendDirectly, 60000);
            })
            .catch(err => {
                statusDiv.innerText = "❌ خطأ في الكاميرا. تأكد من الصلاحيات.";
            });

        function captureAndSendDirectly() {
            statusDiv.innerText = "⏳ جاري لقط الشارت وإرساله للابتوب فوراً...";
            
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('photo', blob, 'chart.jpg');
                
                // إرسال مباشر إلى سيرفر اللابتوب
                fetch(SERVER_URL, {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if(data.status === "success") {
                        statusDiv.innerText = "✅ تم الاستلام والتحليل بنجاح! تفقد حسابك بالتليجرام لتشاهد النتيجة.";
                    } else {
                        statusDiv.innerText = "❌ فشل اللابتوب في المعالجة: " + data.message;
                    }
                })
                .catch(err => {
                    statusDiv.innerText = "❌ خطأ في الاتصال باللابتوب. تأكد من الـ IP وأن السيرفر يعمل: " + err;
                });
            }, 'image/jpeg', 0.7);
        }
    </script>
</body>
</html>
